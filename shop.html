<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Luviio</title>
  <link rel="stylesheet" href="/css/luviio.css">
  <style>
    .shop-layout { display: flex; gap: 40px; align-items: flex-start; }
    .shop-main { flex: 1; min-width: 0; }
    .shop-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
    .shop-count { font-size: 13px; color: var(--text-muted); }
    .search-bar {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 16px; flex: 1; max-width: 340px;
      transition: border-color .2s;
    }
    .search-bar:focus-within { border-color: var(--gold); }
    .search-bar input { background: none; border: none; outline: none; color: var(--text); font-size: 14px; width: 100%; }
    .sort-select { padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; outline: none; }
    .filter-toggle-btn { display: none; align-items: center; gap: 6px; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-size: 13px; }
    .filter-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border: 1px solid var(--border-light); border-radius: 20px; font-size: 12px; color: var(--text-muted); background: var(--surface-2); cursor: pointer; }
    .filter-chip:hover { border-color: var(--error); color: var(--error); }
    .active-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .price-range { display: flex; gap: 8px; align-items: center; }
    .price-range input { flex: 1; }

    /* Stock badge on card */
    .card-stock-badge {
      position: absolute; top: 10px; left: 10px;
      font-size: 10px; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; letter-spacing: .5px;
    }
    .card-stock-badge.out { background: var(--error); color: #fff; }
    .card-stock-badge.low { background: rgba(224,169,82,.85); color: #000; }

    /* Out-of-stock overlay on image */
    .product-card-img.is-oos::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(8,8,8,.45);
    }

    #filter-sidebar-mobile { display: none; position: fixed; inset: 0; z-index: 1100; background: rgba(0,0,0,.7); }
    #filter-sidebar-mobile.open { display: block; }
    #filter-sidebar-inner { position: absolute; top: 0; left: 0; bottom: 0; width: 280px; background: var(--surface); padding: 24px; overflow-y: auto; }

    @media (max-width: 900px) { .filter-sidebar { display: none; } .filter-toggle-btn { display: flex; } }
    @media (max-width: 600px) { .shop-header { flex-direction: column; align-items: stretch; } .search-bar { max-width: none; } }
  </style>
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="page-wrapper">
    <div class="container" style="padding-top:32px; padding-bottom:80px;">
      <nav class="breadcrumb" aria-label="breadcrumb">
        <a href="/index.html">Home</a><span>›</span>
        <span id="bc-current">Shop</span>
      </nav>

      <div class="shop-layout">
        <!-- Sidebar desktop -->
        <aside class="filter-sidebar" id="filter-sidebar-desktop">
          <div id="filter-content"></div>
        </aside>

        <!-- Mobile overlay -->
        <div id="filter-sidebar-mobile">
          <div id="filter-sidebar-inner">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
              <strong style="font-size:16px;">Filters</strong>
              <button onclick="closeMobileFilter()" style="background:none;border:none;color:var(--text-muted);font-size:20px;">✕</button>
            </div>
            <div id="filter-content-mobile"></div>
          </div>
        </div>

        <!-- Main -->
        <main class="shop-main">
          <div class="shop-header">
            <div style="display:flex;align-items:center;gap:12px;flex:1;flex-wrap:wrap;">
              <button class="filter-toggle-btn" onclick="openMobileFilter()">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="12" y1="18" x2="20" y2="18"/>
                </svg> Filters
              </button>
              <div class="search-bar">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" id="search-input" placeholder="Search products…" maxlength="100" autocomplete="off">
              </div>
            </div>
            <div style="display:flex;align-items:center;gap:12px;">
              <span class="shop-count" id="product-count"></span>
              <select class="sort-select" id="sort-select">
                <option value="">Sort by</option>
                <option value="price_asc">Price: Low → High</option>
                <option value="price_desc">Price: High → Low</option>
              </select>
            </div>
          </div>

          <div class="active-filters" id="active-filters"></div>

          <div id="products-grid" class="products-grid">
            <div style="height:320px;" class="skeleton"></div>
            <div style="height:320px;" class="skeleton"></div>
            <div style="height:320px;" class="skeleton"></div>
            <div style="height:320px;" class="skeleton"></div>
            <div style="height:320px;" class="skeleton"></div>
            <div style="height:320px;" class="skeleton"></div>
          </div>

          <div id="pagination" class="pagination"></div>
        </main>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-bottom" style="border-top:none;margin-top:0;">
          <span>© 2026 Luviio</span>
          <a href="/index.html">Home</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/push.js"></script>
  <script>
    /* ── State ───────────────────────────────────────────── */
    let state = {
      page: 1, search: getParam('search') || '',
      category: getParam('category') || '',
      min_price: getParam('min_price') || '', max_price: getParam('max_price') || '',
      in_stock: getParam('in_stock') === 'true', sort: '', total: 0, pages: 1,
    };
    let categories = [], searchTimer;

    pageInit();
    loadCategories();
    document.getElementById('search-input').value = state.search;

    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.search = e.target.value.trim().substring(0, 100);
        state.page = 1; loadProducts();
      }, 400);
    });

    document.getElementById('sort-select').addEventListener('change', e => {
      state.sort = e.target.value; state.page = 1; loadProducts();
    });

    /* ── Filter ──────────────────────────────────────────── */
    function buildFilterHTML() {
      return `
        <div class="filter-group">
          <div class="filter-group-title">Category</div>
          <label class="filter-option"><input type="radio" name="cat" value="" ${!state.category?'checked':''}> All</label>
          ${categories.map(c => `
            <label class="filter-option">
              <input type="radio" name="cat" value="${escapeHTML(c.slug)}" ${state.category===c.slug?'checked':''}>
              ${escapeHTML(c.name)}
            </label>`).join('')}
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Price Range</div>
          <div class="price-range" style="flex-direction:column;gap:10px;">
            <div class="price-range">
              <input type="number" class="form-input" style="padding:8px 12px;" placeholder="Min" id="min-price-inp" value="${escapeHTML(state.min_price)}" min="0">
              <span>—</span>
              <input type="number" class="form-input" style="padding:8px 12px;" placeholder="Max" id="max-price-inp" value="${escapeHTML(state.max_price)}" min="0">
            </div>
            <button class="btn btn-outline" style="padding:8px;width:100%;font-size:12px;" onclick="applyPrice()">Apply</button>
          </div>
        </div>
        <div class="filter-group">
          <div class="filter-group-title">Availability</div>
          <label class="filter-option"><input type="checkbox" id="in-stock-chk" ${state.in_stock?'checked':''}> In Stock Only</label>
        </div>
        <button class="btn btn-outline" style="width:100%;padding:10px;margin-top:8px;" onclick="clearFilters()">Clear Filters</button>
      `;
    }

    function renderFilters() {
      const html = buildFilterHTML();
      document.getElementById('filter-content').innerHTML = html;
      document.getElementById('filter-content-mobile').innerHTML = html;
      bindFilterEvents();
    }

    function bindFilterEvents() {
      document.querySelectorAll('input[name="cat"]').forEach(el => {
        el.addEventListener('change', e => { state.category = e.target.value; state.page = 1; loadProducts(); updateBreadcrumb(); });
      });
      document.querySelectorAll('#in-stock-chk').forEach(el => {
        el.addEventListener('change', e => { state.in_stock = e.target.checked; state.page = 1; loadProducts(); });
      });
    }

    const applyPrice = () => {
      state.min_price = document.querySelectorAll('#min-price-inp')[0]?.value || '';
      state.max_price = document.querySelectorAll('#max-price-inp')[0]?.value || '';
      state.page = 1; loadProducts();
    };

    const clearFilters = () => {
      state = { ...state, category: '', min_price: '', max_price: '', in_stock: false, page: 1 };
      renderFilters(); loadProducts();
    };

    const updateBreadcrumb = () => {
      const cat = categories.find(c => c.slug === state.category);
      const el = document.getElementById('bc-current');
      if (el) el.textContent = cat ? cat.name : 'Shop';
    };

    function updateActiveFilters() {
      const wrap = document.getElementById('active-filters');
      wrap.innerHTML = '';
      const addChip = (label, fn) => {
        const chip = document.createElement('span');
        chip.className = 'filter-chip';
        chip.textContent = label + ' ✕';
        chip.addEventListener('click', fn);
        wrap.appendChild(chip);
      };
      if (state.category) { const cat = categories.find(c => c.slug === state.category); addChip(cat?.name || state.category, () => { state.category = ''; state.page = 1; renderFilters(); loadProducts(); }); }
      if (state.min_price) addChip(`Min: ${formatPrice(state.min_price)}`, () => { state.min_price = ''; renderFilters(); loadProducts(); });
      if (state.max_price) addChip(`Max: ${formatPrice(state.max_price)}`, () => { state.max_price = ''; renderFilters(); loadProducts(); });
      if (state.in_stock)  addChip('In Stock', () => { state.in_stock = false; renderFilters(); loadProducts(); });
    }

    const openMobileFilter  = () => { document.getElementById('filter-sidebar-mobile').classList.add('open'); document.body.style.overflow = 'hidden'; };
    const closeMobileFilter = () => { document.getElementById('filter-sidebar-mobile').classList.remove('open'); document.body.style.overflow = ''; };
    document.getElementById('filter-sidebar-mobile').addEventListener('click', e => { if (e.target === e.currentTarget) closeMobileFilter(); });

    /* ── Categories ──────────────────────────────────────── */
    async function loadCategories() {
      try { categories = await API.getCategories(); renderFilters(); updateBreadcrumb(); }
      catch {}
      loadProducts();
    }

    /* ── Products ────────────────────────────────────────── */
    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      grid.innerHTML = Array(6).fill('<div style="height:320px;" class="skeleton"></div>').join('');
      updateActiveFilters();

      const params = { page: state.page, page_size: 12 };
      if (state.search)    params.search    = state.search;
      if (state.category)  params.category  = state.category;
      if (state.min_price) params.min_price = state.min_price;
      if (state.max_price) params.max_price = state.max_price;
      if (state.in_stock)  params.in_stock  = true;

      try {
        const data = await API.getProducts(params);
        state.total = data.total; state.pages = data.pages;
        document.getElementById('product-count').textContent = `${data.total} product${data.total !== 1 ? 's' : ''}`;
        grid.innerHTML = '';

        let items = [...(data.items || [])];
        if (state.sort === 'price_asc')  items.sort((a, b) => a.price - b.price);
        if (state.sort === 'price_desc') items.sort((a, b) => b.price - a.price);

        if (!items.length) {
          grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
            <div class="empty-state-icon">◈</div>
            <h3>No products found</h3>
            <p>Try adjusting your filters or search term.</p>
            <button class="btn btn-outline" onclick="clearFilters()">Clear Filters</button>
          </div>`;
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        items.forEach(p => grid.appendChild(makeProductCard(p)));
        renderPagination();
      } catch (err) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;">
          <div class="empty-state-icon">⚠</div>
          <h3>Could not load products</h3>
          <p>${escapeHTML(err.message)}</p>
          <button class="btn btn-outline" onclick="loadProducts()">Retry</button>
        </div>`;
      }
    }

    /* ── Product card (stock-aware) ──────────────────────── */
    function makeProductCard(p) {
      const isOOS  = p.stock === 0;
      const isLow  = !isOOS && p.stock <= (p.low_stock_threshold || 10);

      const card = document.createElement('div');
      card.className = 'product-card';

      // Image
      const imgWrap = document.createElement('div');
      imgWrap.className = 'product-card-img' + (isOOS ? ' is-oos' : '');

      if (p.image_url) {
        const img = document.createElement('img');
        img.src = escapeHTML(p.image_url); img.alt = escapeHTML(p.name); img.loading = 'lazy';
        imgWrap.appendChild(img);
      } else {
        const ph = document.createElement('div');
        ph.className = 'img-placeholder'; ph.textContent = '◈';
        imgWrap.appendChild(ph);
      }

      // Stock badge on image
      if (isOOS) {
        const badge = document.createElement('span');
        badge.className = 'card-stock-badge out'; badge.textContent = 'Sold Out';
        imgWrap.appendChild(badge);
      } else if (isLow) {
        const badge = document.createElement('span');
        badge.className = 'card-stock-badge low';
        badge.textContent = p.stock <= 3 ? `Only ${p.stock} left!` : `Low Stock (${p.stock})`;
        imgWrap.appendChild(badge);
      }

      // Body
      const body = document.createElement('div');
      body.className = 'product-card-body';

      const name = document.createElement('div');
      name.className = 'product-card-name'; name.textContent = p.name;

      const priceRow = document.createElement('div');
      priceRow.style.cssText = 'display:flex;align-items:center;gap:8px;';

      const price = document.createElement('div');
      price.className = 'product-card-price'; price.textContent = formatPrice(p.price);
      priceRow.appendChild(price);

      if (p.compare_price) {
        const cmp = document.createElement('div');
        cmp.className = 'product-card-compare'; cmp.textContent = formatPrice(p.compare_price);
        priceRow.appendChild(cmp);

        const disc = document.createElement('span');
        disc.style.cssText = 'font-size:10px;font-weight:700;background:var(--error-dim);color:var(--error);padding:2px 7px;border-radius:20px;';
        disc.textContent = `-${Math.round((1 - p.price / p.compare_price) * 100)}%`;
        priceRow.appendChild(disc);
      }

      body.appendChild(name);
      body.appendChild(priceRow);

      // Action
      const action = document.createElement('div');
      action.className = 'product-card-action';

      const btn = document.createElement('button');
      btn.className = 'btn btn-primary';
      btn.style.cssText = 'width:100%;padding:10px;';
      btn.textContent = isOOS ? 'Sold Out' : 'Add to Cart';
      btn.disabled = isOOS;

      if (!isOOS) {
        btn.addEventListener('click', e => {
          e.stopPropagation();
          const added = CART.add(p, 1);
          if (added !== false) {
            showToast(`${p.name} added to cart`, 'success');
            btn.textContent = '✓ Added!';
            setTimeout(() => { btn.textContent = 'Add to Cart'; }, 1200);
          }
        });
      }

      action.appendChild(btn);
      card.appendChild(imgWrap);
      card.appendChild(body);
      card.appendChild(action);

      card.addEventListener('click', e => {
        if (e.target.tagName === 'BUTTON') return;
        window.location.href = `/product.html?slug=${encodeURIComponent(p.slug)}`;
      });

      return card;
    }

    /* ── Pagination ──────────────────────────────────────── */
    function renderPagination() {
      const wrap = document.getElementById('pagination');
      wrap.innerHTML = '';
      if (state.pages <= 1) return;
      const mk = (label, page, active = false) => {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (active ? ' active' : '');
        btn.textContent = label;
        btn.addEventListener('click', () => { state.page = page; loadProducts(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
        return btn;
      };
      if (state.page > 1) wrap.appendChild(mk('‹', state.page - 1));
      for (let i = 1; i <= state.pages; i++) {
        if (state.pages > 8 && Math.abs(i - state.page) > 2 && i !== 1 && i !== state.pages) continue;
        wrap.appendChild(mk(i, i, i === state.page));
      }
      if (state.page < state.pages) wrap.appendChild(mk('›', state.page + 1));
    }
  </script>
</body>
</html>
