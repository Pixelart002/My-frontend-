<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Luviio</title>
  <link rel="stylesheet" href="/css/luviio.css">
  <style>
    .auth-page { min-height: calc(100vh - var(--nav-h)); display: flex; align-items: center; justify-content: center; padding: 40px 24px; }
    .auth-card {
      width: 100%; max-width: 440px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 40px;
    }
    .auth-logo { font-family:'Playfair Display',serif;font-size:24px;font-weight:700;letter-spacing:4px;color:var(--gold);text-align:center;margin-bottom:32px; }
    .pass-wrap { position: relative; }
    .pass-toggle {
      position:absolute;right:14px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;letter-spacing:1px;
    }
    .strength-bar { height:3px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden; }
    .strength-fill { height:100%;border-radius:2px;transition:width 0.3s,background 0.3s; }
    .auth-divider { display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-dim);font-size:12px; }
    .auth-divider::before,.auth-divider::after { content:'';flex:1;height:1px;background:var(--border); }
    .password-hints { font-size:11px;color:var(--text-dim);display:flex;flex-direction:column;gap:3px;margin-top:6px; }
    .hint { display:flex;align-items:center;gap:6px; }
    .hint.ok { color:var(--success); }
    .hint.fail { color:var(--text-dim); }
  </style>
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="page-wrapper">
    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-logo">LUVIIO</div>

        <!-- Tabs -->
        <div class="tabs">
          <button class="tab-btn active" data-tab="login">Sign In</button>
          <button class="tab-btn" data-tab="register">Create Account</button>
        </div>

        <!-- Login Tab -->
        <div class="tab-panel active" id="tab-login">
          <form id="login-form" novalidate>
            <div style="display:flex;flex-direction:column;gap:20px;">
              <div class="form-group">
                <label class="form-label" for="login-email">Email</label>
                <input type="email" id="login-email" class="form-input" placeholder="you@example.com" maxlength="254" autocomplete="email" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="login-pass">Password</label>
                <div class="pass-wrap">
                  <input type="password" id="login-pass" class="form-input" placeholder="••••••••" maxlength="128" autocomplete="current-password" required>
                  <button type="button" class="pass-toggle" onclick="togglePass('login-pass',this)">SHOW</button>
                </div>
              </div>
              <div id="login-error" class="form-error" style="display:none;"></div>
              <button type="submit" class="btn btn-primary" id="login-btn" style="width:100%;justify-content:center;">Sign In</button>
            </div>
          </form>

          <div class="auth-divider">or</div>
          <p style="text-align:center;font-size:13px;color:var(--text-muted);">
            Forgot password?
            <button id="forgot-btn" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:13px;">Reset it</button>
          </p>
        </div>

        <!-- Register Tab -->
        <div class="tab-panel" id="tab-register">
          <form id="register-form" novalidate>
            <div style="display:flex;flex-direction:column;gap:20px;">
              <div class="form-group">
                <label class="form-label" for="reg-name">Full Name</label>
                <input type="text" id="reg-name" class="form-input" placeholder="Your Name" maxlength="255" autocomplete="name">
              </div>
              <div class="form-group">
                <label class="form-label" for="reg-email">Email</label>
                <input type="email" id="reg-email" class="form-input" placeholder="you@example.com" maxlength="254" autocomplete="email" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="reg-pass">Password</label>
                <div class="pass-wrap">
                  <input type="password" id="reg-pass" class="form-input" placeholder="Min 8 chars" maxlength="128" autocomplete="new-password" required>
                  <button type="button" class="pass-toggle" onclick="togglePass('reg-pass',this)">SHOW</button>
                </div>
                <div class="strength-bar"><div class="strength-fill" id="strength-fill" style="width:0;"></div></div>
                <div class="password-hints" id="pass-hints">
                  <span class="hint fail" id="hint-len">✗ Minimum 8 characters</span>
                  <span class="hint fail" id="hint-upper">✗ At least one uppercase letter</span>
                  <span class="hint fail" id="hint-num">✗ At least one number</span>
                </div>
              </div>
              <div id="register-error" class="form-error" style="display:none;"></div>
              <button type="submit" class="btn btn-primary" id="reg-btn" style="width:100%;justify-content:center;">Create Account</button>
              <p style="text-align:center;font-size:12px;color:var(--text-dim);">
                By creating an account you agree to our terms of service.
              </p>
            </div>
          </form>
        </div>

        <!-- Forgot password (hidden by default) -->
        <div id="forgot-section" style="display:none;margin-top:20px;">
          <hr class="divider">
          <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;">Enter your email and we'll send a reset link.</p>
          <div style="display:flex;gap:10px;">
            <input type="email" id="forgot-email" class="form-input" placeholder="your@email.com" maxlength="254" style="flex:1;">
            <button id="forgot-submit" class="btn btn-outline" style="white-space:nowrap;">Send Link</button>
          </div>
          <div id="forgot-msg" style="font-size:13px;color:var(--success);margin-top:10px;display:none;"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    /* If already logged in, redirect */
    (async () => {
      await AUTH.init();
      if (AUTH.isLoggedIn()) {
        const redirect = safeRedirect(getParam('redirect'));
        window.location.href = redirect;
      }
    })();

    pageInit();

    /* ── Tabs ────────────────────────────────────────────── */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
      });
    });

    /* ── Show/hide password ──────────────────────────────── */
    function togglePass(inputId, btn) {
      const inp = document.getElementById(inputId);
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = 'HIDE'; }
      else { inp.type = 'password'; btn.textContent = 'SHOW'; }
    }

    /* ── Password strength indicator ─────────────────────── */
    document.getElementById('reg-pass').addEventListener('input', e => {
      const v = e.target.value;
      const hasLen   = v.length >= 8;
      const hasUpper = /[A-Z]/.test(v);
      const hasNum   = /[0-9]/.test(v);
      const score    = [hasLen, hasUpper, hasNum].filter(Boolean).length;

      const fill = document.getElementById('strength-fill');
      const colors = ['', '#e05252', '#e0a952', '#5ec789'];
      const widths = ['0', '33%', '66%', '100%'];
      fill.style.width     = widths[score];
      fill.style.background = colors[score];

      const upd = (id, ok) => {
        const el = document.getElementById(id);
        el.className = 'hint ' + (ok ? 'ok' : 'fail');
        el.textContent = (ok ? '✓' : '✗') + el.textContent.slice(1);
      };
      upd('hint-len',   hasLen);
      upd('hint-upper', hasUpper);
      upd('hint-num',   hasNum);
    });

    /* ── Login ───────────────────────────────────────────── */
    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const pass  = document.getElementById('login-pass').value;
      const errEl = document.getElementById('login-error');
      const btn   = document.getElementById('login-btn');

      errEl.style.display = 'none';

      if (!validateEmail(email)) {
        errEl.textContent = 'Please enter a valid email address.';
        errEl.style.display = 'block';
        return;
      }
      if (!pass) {
        errEl.textContent = 'Please enter your password.';
        errEl.style.display = 'block';
        return;
      }

      showLoader(btn, 'Signing in…');
      try {
        const data = await API.login(email, pass);
        AUTH.setTokens(data.access_token, data.refresh_token);
        const redirect = safeRedirect(getParam('redirect'));
        window.location.href = redirect;
      } catch (err) {
        errEl.textContent = err.message || 'Invalid email or password.';
        errEl.style.display = 'block';
        hideLoader(btn);
      }
    });

    /* ── Register ────────────────────────────────────────── */
    document.getElementById('register-form').addEventListener('submit', async e => {
      e.preventDefault();
      const name  = document.getElementById('reg-name').value.trim().substring(0, 255);
      const email = document.getElementById('reg-email').value.trim();
      const pass  = document.getElementById('reg-pass').value;
      const errEl = document.getElementById('register-error');
      const btn   = document.getElementById('reg-btn');

      errEl.style.display = 'none';

      if (!validateEmail(email)) {
        errEl.textContent = 'Please enter a valid email address.';
        errEl.style.display = 'block';
        return;
      }

      const pwErrors = validatePassword(pass);
      if (pwErrors.length) {
        errEl.textContent = pwErrors.join('. ');
        errEl.style.display = 'block';
        return;
      }

      showLoader(btn, 'Creating account…');
      try {
        await API.register(email, pass, name);
        showToast('Account created! Please check your email to verify.', 'success', 6000);
        // Switch to login tab
        document.querySelector('[data-tab="login"]').click();
        document.getElementById('login-email').value = email;
      } catch (err) {
        errEl.textContent = err.message || 'Registration failed.';
        errEl.style.display = 'block';
      } finally {
        hideLoader(btn);
      }
    });

    /* ── Forgot password ─────────────────────────────────── */
    document.getElementById('forgot-btn').addEventListener('click', () => {
      const s = document.getElementById('forgot-section');
      s.style.display = s.style.display === 'none' ? 'block' : 'none';
    });

    document.getElementById('forgot-submit').addEventListener('click', async () => {
      const email = document.getElementById('forgot-email').value.trim();
      const msg   = document.getElementById('forgot-msg');
      const btn   = document.getElementById('forgot-submit');

      if (!validateEmail(email)) {
        showToast('Enter a valid email', 'error');
        return;
      }

      showLoader(btn, 'Sending…');
      try {
        await API.forgotPw(email);
        msg.textContent = 'If this email exists, a reset link has been sent.';
        msg.style.display = 'block';
      } catch {
        msg.textContent = 'If this email exists, a reset link has been sent.';
        msg.style.display = 'block';
      } finally {
        hideLoader(btn);
      }
    });
  </script>
</body>
</html>
