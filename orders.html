<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — Luviio</title>

  <!-- FIX: Preconnect so fonts don't cause FOUT -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/luviio.css">

  <style>

    /* ── CSS Variable Fallbacks for undefined vars ─────────────────────────── */
    /* FIX: Define missing variables that luviio.css may not have */
    :root {
      --radius-lg:    16px;
      --border-light: rgba(255,255,255,0.06);  /* FIX: was undefined → fallback */
      --error-dim:    rgba(248,113,113,0.08);  /* FIX: was undefined → fallback */
      --gold-dim:     rgba(201,169,110,0.12);
    }

    /* ── Layout ───────────────────────────────────────────────────────────── */
    .orders-layout {
      padding: 40px 0 80px;
      max-width: 900px;
      margin: 0 auto;
    }
    .orders-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    /* ── Order Card ───────────────────────────────────────────────────────── */
    .order-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    .order-card:hover {
      border-color: rgba(201,169,110,0.3);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }

    /* ── Order Header ─────────────────────────────────────────────────────── */
    /* FIX: Removed position:relative here — chevron was using absolute
       but order-header-right used flex, causing double-positioning conflict.
       Now chevron is purely flex — no absolute positioning at all. */
    .order-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px;
      cursor: pointer;
      gap: 16px;
      user-select: none;
    }
    .order-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }
    .order-num {
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .order-date {
      font-size: 12px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .order-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;  /* FIX: prevents squishing on narrow screens */
    }
    .order-total {
      font-size: 16px;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
    }

    /* FIX: Chevron — pure flex item, no absolute/relative games */
    .chevron {
      transition: all 0.3s ease;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      min-width: 32px;  /* FIX: prevents flex shrink */
      border-radius: 50%;
      background: var(--surface-2);
      flex-shrink: 0;
    }
    .order-card:hover .chevron {
      background: rgba(201,169,110,0.1);
      color: var(--gold);
    }
    .chevron.open {
      transform: rotate(180deg);
      background: var(--gold);
      color: #000;
    }

    /* ── Order Body ───────────────────────────────────────────────────────── */
    .order-body {
      display: none;
      border-top: 1px solid var(--border);
    }
    .order-body.open {
      display: block;
      animation: slideDown 0.3s ease forwards;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .order-body-inner { padding: 28px; }

    /* ── Status Badge ─────────────────────────────────────────────────────── */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      white-space: nowrap;
    }
    .status-pending   { background: rgba(224,169,82,.1);  color: var(--warn);    border: 1px solid rgba(224,169,82,.2); }
    .status-paid      { background: rgba(56,189,248,.1);  color: #38bdf8;        border: 1px solid rgba(56,189,248,.2); }
    .status-shipped   { background: rgba(167,139,250,.1); color: #a78bfa;        border: 1px solid rgba(167,139,250,.2); }
    .status-delivered { background: rgba(74,222,128,.1);  color: var(--success); border: 1px solid rgba(74,222,128,.2); }
    .status-cancelled,
    .status-refunded  { background: rgba(248,113,113,.1); color: var(--error);   border: 1px solid rgba(248,113,113,.2); }

    /* ── Status Timeline ──────────────────────────────────────────────────── */
    /* FIX: Was causing full-page horizontal scroll on mobile.
       overflow-x on the timeline itself + padding prevents page blowout. */
    .status-timeline {
      display: flex;
      align-items: flex-start;
      margin-bottom: 32px;
      overflow-x: auto;
      padding-bottom: 8px;
      padding-left: 2px;
      padding-right: 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .status-timeline::-webkit-scrollbar { display: none; }

    .tl-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 72px;  /* FIX: was causing steps to shrink below icon size */
      max-width: 120px;
      position: relative;
    }
    .tl-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 15px;
      left: calc(50% + 16px);
      width: calc(100% - 32px);
      height: 2px;
      background: var(--border);
    }
    .tl-step.done:not(:last-child)::after { background: var(--gold); }

    .tl-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      position: relative;
      z-index: 1;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .tl-step.done .tl-dot    { border-color: var(--gold);  background: var(--gold-dim); color: var(--gold); }
    .tl-step.current .tl-dot { border-color: var(--gold);  background: var(--gold);     color: #000; box-shadow: 0 0 0 4px rgba(201,169,110,0.2); }
    .tl-step.cancelled .tl-dot { border-color: var(--error); background: var(--error-dim); color: var(--error); }  /* FIX: var(--error-dim) now defined above */

    .tl-label {
      font-size: 10px;
      font-weight: 600;
      margin-top: 8px;
      color: var(--text-dim);
      text-align: center;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }
    .tl-step.done .tl-label,
    .tl-step.current .tl-label { color: var(--text); }

    /* ── Details Grid ─────────────────────────────────────────────────────── */
    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .info-box {
      padding: 16px 20px;
      background: var(--surface-2);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }
    .info-box-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .info-box-text {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ── Order Items ──────────────────────────────────────────────────────── */
    .oi-row {
      display: flex;
      gap: 14px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px dashed var(--border);
    }
    .oi-row:last-child { border-bottom: none; }

    /* FIX: var(--border-light) was undefined → now uses defined fallback */
    .oi-img {
      width: 56px;
      height: 70px;
      border-radius: var(--radius);
      background: var(--surface-2);
      overflow: hidden;
      border: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--border-light);  /* now resolves correctly */
    }
    .oi-img img { width: 100%; height: 100%; object-fit: cover; }

    .oi-info { flex: 1; min-width: 0; }
    .oi-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .oi-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .oi-price {
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Order Bottom (Summary + Actions) ────────────────────────────────── */
    /* FIX: Removed column-reverse — summary showing above actions is confusing.
       Natural order: actions on left, summary on right (desktop).
       Mobile: actions top, summary bottom (logical flow). */
    .order-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 24px;
      gap: 20px;
      flex-wrap: wrap;
    }
    .order-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .order-summary {
      width: 100%;
      max-width: 280px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
      padding: 5px 0;
    }
    .summary-row.total {
      font-weight: 700;
      color: var(--text);
      font-size: 15px;
      border-top: 2px solid var(--border);
      margin-top: 8px;
      padding-top: 12px;
    }

    /* ── Pagination ───────────────────────────────────────────────────────── */
    .pagination-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      margin-top: 48px;
      flex-wrap: wrap;
    }
    .page-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-muted);
      min-width: 36px;
      height: 36px;
      padding: 0 10px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      line-height: 1;
    }
    .page-btn:hover:not(:disabled):not(.active) {
      background: var(--surface-2);
      color: var(--text);
    }
    .page-btn.active {
      background: var(--gold);
      color: #000;
      box-shadow: 0 4px 12px rgba(201,169,110,0.3);
      cursor: default;
      pointer-events: none;
    }
    .page-btn.nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .page-btn.nav-btn:hover:not(:disabled) {
      border-color: var(--gold);
      color: var(--gold);
    }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Spinner ──────────────────────────────────────────────────────────── */
    .spinner-sm {
      border: 2px solid rgba(201,169,110,0.2);
      border-top-color: var(--gold);
      border-radius: 50%;
      width: 14px;
      height: 14px;
      animation: spin 0.8s linear infinite;
      display: inline-block;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty / Error State ──────────────────────────────────────────────── */
    .orders-empty {
      text-align: center;
      padding: 64px 24px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
    }
    .orders-empty .empty-icon {
      font-size: 52px;
      color: var(--border);
      margin-bottom: 16px;
      line-height: 1;
    }
    .orders-empty h3 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      margin-bottom: 8px;
      color: var(--text);
    }
    .orders-empty p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 28px;
    }

    /* ================================================================
       MEDIA QUERIES — Complete responsive breakpoints
       ================================================================ */

    /* ── 900px — Narrow desktop / large tablet ──────────────────── */
    @media (max-width: 900px) {
      .orders-layout { padding: 32px 0 64px; }
    }

    /* ── 768px — Tablet ──────────────────────────────────────────── */
    @media (max-width: 768px) {
      .orders-layout { padding: 24px 0 60px; }

      .orders-header { margin-bottom: 24px; }
      .orders-header .section-title { font-size: 22px; }

      /* Order header: stack meta and right-side info */
      .order-header {
        padding: 16px 18px;
        /* FIX: flex-wrap so content doesn't overflow on small tablets */
        flex-wrap: wrap;
        gap: 12px;
      }
      .order-meta { flex: 1 1 calc(100% - 50px); }
      /* FIX: Right side moves to second row, chevron stays in top-right */
      .order-header-right {
        width: 100%;
        justify-content: space-between;
        order: 2;
      }
      /* FIX: Chevron fixed to top-right corner of card header — clean approach */
      .chevron {
        position: absolute;
        top: 16px;
        right: 18px;
        margin: 0;
      }
      /* Required for absolute chevron positioning */
      .order-header { position: relative; padding-right: 58px; }

      .order-body-inner { padding: 20px 18px; }

      .details-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .order-bottom {
        flex-direction: column;   /* FIX: natural order, not column-reverse */
        align-items: stretch;
        gap: 16px;
      }
      .order-summary { max-width: 100%; }

      .order-actions { width: 100%; }
      .order-actions .btn { flex: 1; justify-content: center; }
    }

    /* ── 600px — Large phone ─────────────────────────────────────── */
    @media (max-width: 600px) {
      .orders-layout { padding: 20px 0 48px; }

      .orders-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 20px;
      }
      .orders-header .btn { width: 100%; justify-content: center; }

      .order-num { font-size: 14px; }
      .order-total { font-size: 14px; }
      .status-badge { font-size: 10px; padding: 3px 8px; }

      /* Timeline: smaller dots on phones */
      .tl-dot { width: 28px; height: 28px; font-size: 12px; }
      .tl-step:not(:last-child)::after { top: 13px; left: calc(50% + 14px); width: calc(100% - 28px); }
      .tl-label { font-size: 9px; }

      /* Items: smaller thumbnail */
      .oi-img { width: 48px; height: 60px; }
      .oi-name { font-size: 13px; }
      .oi-price { font-size: 14px; }

      .info-box { padding: 12px 16px; }
    }

    /* ── 480px — Small phone ─────────────────────────────────────── */
    @media (max-width: 480px) {
      .orders-empty { padding: 48px 16px; }
      .orders-empty .empty-icon { font-size: 44px; }
      .orders-empty h3 { font-size: 18px; }

      .order-header { padding: 14px 14px; padding-right: 52px; }
      .chevron { right: 14px; top: 14px; width: 28px; height: 28px; }
      .chevron i { font-size: 17px !important; }

      .order-body-inner { padding: 16px 14px; }

      /* Pagination: smaller on tiny screens */
      .page-btn { min-width: 32px; height: 32px; font-size: 12px; padding: 0 8px; }
      .pagination-wrapper { gap: 4px; margin-top: 32px; }

      /* Summary row: tighter */
      .summary-row { font-size: 12px; }
      .summary-row.total { font-size: 14px; }

      /* Buttons: full width on very small screens */
      .order-actions { flex-direction: column; }
      .order-actions .btn { width: 100%; }
    }

    /* ── 380px — Very small (Galaxy A series etc.) ───────────────── */
    @media (max-width: 380px) {
      .order-header-right { gap: 8px; }
      .order-num { font-size: 13px; }
      .status-badge { display: none; } /* too cramped — status visible in timeline */
      .order-total { font-size: 13px; }

      /* Show status indicator dot instead */
      .order-meta::after {
        content: attr(data-status);
        font-size: 11px;
        font-weight: 600;
        color: var(--gold);
        text-transform: capitalize;
      }
    }
  </style>
</head>
<body>

  <nav id="main-nav"></nav>

  <div class="page-wrapper">
    <div class="container orders-layout">

      <div class="orders-header">
        <div>
          <h1 class="section-title" style="margin-bottom:6px;">My Orders</h1>
          <p style="color:var(--text-muted);font-size:14px;">
            <i class="ri-history-line" style="margin-right:6px;vertical-align:middle;"></i>
            Track and manage your purchases
          </p>
        </div>
        <a href="/shop.html" class="btn btn-outline" style="padding:10px 20px;">
          <i class="ri-shopping-bag-3-line" style="margin-right:8px;"></i> Continue Shopping
        </a>
      </div>

      <div id="orders-container">
        <div style="height:110px;margin-bottom:20px;border-radius:16px;" class="skeleton"></div>
        <div style="height:110px;margin-bottom:20px;border-radius:16px;" class="skeleton"></div>
        <div style="height:110px;border-radius:16px;" class="skeleton"></div>
      </div>

      <div id="orders-pagination" class="pagination-wrapper"></div>

    </div>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-bottom" style="border-top:none;margin-top:0;">
          <span>© 2026 Luviio. All rights reserved.</span>
        </div>
      </div>
    </footer>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>

  <script>
    let currentPage = 1, totalPages = 1;

    const STATUS_FLOW  = ['pending', 'paid', 'shipped', 'delivered'];
    const STATUS_ICONS = {
      pending:   'ri-time-line',
      paid:      'ri-bank-card-line',
      shipped:   'ri-truck-line',
      delivered: 'ri-checkbox-circle-line',
      cancelled: 'ri-close-circle-line',
      refunded:  'ri-refund-2-line',
    };

    async function init() {
      const ok = await pageInit({ requireAuth: true });
      if (!ok) return;
      loadOrders(1);
    }
    init();

    /* ── Load & render orders ──────────────────────────────────────────── */
    async function loadOrders(page) {
      currentPage = page;
      const c   = document.getElementById('orders-container');
      const pag = document.getElementById('orders-pagination');

      c.innerHTML = `
        <div style="height:110px;margin-bottom:20px;border-radius:16px;" class="skeleton"></div>
        <div style="height:110px;margin-bottom:20px;border-radius:16px;" class="skeleton"></div>
        <div style="height:110px;border-radius:16px;" class="skeleton"></div>`;
      pag.innerHTML = '';

      try {
        const data = await API.getMyOrders(page);
        totalPages = data.pages || 1;
        c.innerHTML = '';

        if (!data.items?.length) {
          c.innerHTML = `
            <div class="orders-empty">
              <div class="empty-icon"><i class="ri-inbox-archive-line"></i></div>
              <h3>No orders yet</h3>
              <p>Looks like you haven't made your first purchase yet.</p>
              <a href="/shop.html" class="btn btn-primary">Start Shopping</a>
            </div>`;
          return;
        }

        data.items.forEach(o => c.appendChild(makeOrderCard(o)));
        renderPagination();

      } catch (err) {
        c.innerHTML = `
          <div class="orders-empty" style="border-color:rgba(248,113,113,0.3);">
            <div class="empty-icon" style="color:var(--error);"><i class="ri-error-warning-line"></i></div>
            <h3>Could not load orders</h3>
            <p>${escapeHTML(err.message)}</p>
            <button class="btn btn-outline" onclick="loadOrders(${currentPage})">
              <i class="ri-refresh-line" style="margin-right:6px;"></i> Retry
            </button>
          </div>`;
      }
    }

    /* ── Status badge HTML (safe) ──────────────────────────────────────── */
    function getStatusBadgeHTML(status) {
      const icon  = STATUS_ICONS[status] || 'ri-record-circle-line';
      const label = status.charAt(0).toUpperCase() + status.slice(1);
      // FIX: escapeHTML on status (comes from server)
      return `<span class="status-badge status-${escapeHTML(status)}"><i class="${icon}"></i> ${escapeHTML(label)}</span>`;
    }

    /* ── Build order card (DOM, not innerHTML for event-bearing elements) ── */
    function makeOrderCard(order) {
      const card   = document.createElement('div');
      card.className = 'order-card';

      // FIX: set data-status on meta for the 380px CSS trick
      const header = document.createElement('div');
      header.className = 'order-header';

      const itemCount = (order.order_items || []).length;
      header.innerHTML = `
        <div class="order-meta" data-status="${escapeHTML(order.status)}">
          <div class="order-num">Order #${order.id.substring(0, 8).toUpperCase()}</div>
          <div class="order-date">
            <i class="ri-calendar-line"></i>
            ${formatDate(order.created_at)}
            &middot;
            ${itemCount} item${itemCount !== 1 ? 's' : ''}
          </div>
        </div>
        <div class="order-header-right">
          ${getStatusBadgeHTML(order.status)}
          <div class="order-total">${formatPrice(order.total_amount)}</div>
          <div class="chevron"><i class="ri-arrow-down-s-line" style="font-size:20px;"></i></div>
        </div>`;

      const body    = document.createElement('div');
      body.className = 'order-body';
      const chevron = header.querySelector('.chevron');

      header.addEventListener('click', async () => {
        const isOpen = body.classList.contains('open');
        body.classList.toggle('open');
        chevron.classList.toggle('open');

        if (!isOpen && !body.dataset.loaded) {
          body.dataset.loaded = 'true';
          body.innerHTML = '<div class="order-body-inner"><div style="height:80px;border-radius:12px;" class="skeleton"></div></div>';
          try {
            renderOrderBody(body, await API.getMyOrder(order.id));
          } catch (err) {
            body.innerHTML = `<div class="order-body-inner"><p class="form-error"><i class="ri-alert-line"></i> ${escapeHTML(err.message)}</p></div>`;
          }
        }
      });

      card.appendChild(header);
      card.appendChild(body);
      return card;
    }

    /* ── Render expanded order body (pure DOM, no innerHTML for user data) ─ */
    function renderOrderBody(body, order) {
      const isCancelled = ['cancelled', 'refunded'].includes(order.status);
      const currentIdx  = STATUS_FLOW.indexOf(order.status);
      body.innerHTML    = '';

      const inner = document.createElement('div');
      inner.className = 'order-body-inner';

      // ── Timeline ───────────────────────────────────────────────────────────
      const tl = document.createElement('div');
      tl.className = 'status-timeline';

      if (isCancelled) {
        const s = document.createElement('div');
        s.className = 'tl-step cancelled';
        const dot = document.createElement('div');
        dot.className = 'tl-dot';
        dot.innerHTML = '<i class="ri-close-line"></i>';
        const lbl = document.createElement('div');
        lbl.className = 'tl-label';
        lbl.textContent = order.status.toUpperCase();
        s.appendChild(dot); s.appendChild(lbl);
        tl.appendChild(s);
      } else {
        STATUS_FLOW.forEach((key, i) => {
          const state = i < currentIdx ? 'done' : i === currentIdx ? 'current' : '';
          const s     = document.createElement('div');
          s.className = `tl-step ${state}`;
          const dot   = document.createElement('div');
          dot.className = 'tl-dot';
          if (state === 'done')    dot.innerHTML = '<i class="ri-check-line"></i>';
          if (state === 'current') dot.innerHTML = '<i class="ri-loader-4-line"></i>';
          const lbl   = document.createElement('div');
          lbl.className = 'tl-label';
          lbl.textContent = key.toUpperCase();
          s.appendChild(dot); s.appendChild(lbl);
          tl.appendChild(s);
        });
      }
      inner.appendChild(tl);

      // ── Details Grid (Address + Tracking) ──────────────────────────────────
      // FIX: Use DOM instead of innerHTML += to avoid event-listener trashing
      const grid = document.createElement('div');
      grid.className = 'details-grid';
      let hasDetails = false;

      if (order.shipping_line1) {
        const parts = [
          order.shipping_line1, order.shipping_line2,
          order.shipping_city, order.shipping_state,
          order.shipping_postal_code, order.shipping_country,
        ].filter(Boolean);

        const box = document.createElement('div');
        box.className = 'info-box';
        box.innerHTML = `<div class="info-box-label"><i class="ri-map-pin-line"></i> Shipping Address</div>`;
        const txt = document.createElement('div');
        txt.className = 'info-box-text';
        txt.textContent = parts.join(', '); // textContent = XSS safe
        box.appendChild(txt);
        grid.appendChild(box);
        hasDetails = true;
      }

      if (order.tracking_number) {
        const box = document.createElement('div');
        box.className = 'info-box';
        box.style.cssText = 'border-color:var(--gold);background:var(--gold-dim);';
        box.innerHTML = `<div class="info-box-label" style="color:var(--gold);"><i class="ri-truck-line"></i> Tracking Info</div>`;
        const txt = document.createElement('div');
        txt.className = 'info-box-text';
        txt.style.cssText = 'color:var(--text);font-weight:700;font-size:15px;margin-top:4px;';
        txt.textContent = order.tracking_number;
        box.appendChild(txt);
        grid.appendChild(box);
        hasDetails = true;
      }

      if (hasDetails) inner.appendChild(grid);

      // ── Items List ──────────────────────────────────────────────────────────
      const items = order.order_items || [];
      if (items.length) {
        const list = document.createElement('div');
        list.style.marginBottom = '24px';

        items.forEach(item => {
          const row    = document.createElement('div');
          row.className = 'oi-row';
          const imgBox = document.createElement('div');
          imgBox.className = 'oi-img';

          const imageUrl = item.products?.image_url || null;
          if (imageUrl) {
            const img   = document.createElement('img');
            img.loading = 'lazy';
            img.alt     = item.product_name;
            img.src     = imageUrl; // URL from server, not user input
            imgBox.appendChild(img);
          } else {
            imgBox.innerHTML = '<i class="ri-image-line"></i>';
          }

          const info = document.createElement('div');
          info.className = 'oi-info';
          const nm = document.createElement('div');
          nm.className = 'oi-name';
          nm.textContent = item.product_name; // textContent = XSS safe
          const mt = document.createElement('div');
          mt.className = 'oi-meta';
          mt.textContent = `Qty: ${item.quantity} × ${formatPrice(item.unit_price)}`;
          info.appendChild(nm); info.appendChild(mt);

          const price = document.createElement('div');
          price.className = 'oi-price';
          price.textContent = formatPrice(item.subtotal);

          row.appendChild(imgBox); row.appendChild(info); row.appendChild(price);
          list.appendChild(row);
        });
        inner.appendChild(list);
      }

      // ── Bottom: Actions + Summary ───────────────────────────────────────────
      const bottom = document.createElement('div');
      bottom.className = 'order-bottom';

      // Actions (left)
      const actions = document.createElement('div');
      actions.className = 'order-actions';

      // Download Invoice button
      // FIX: API.downloadInvoice likely doesn't exist — graceful fallback
      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn btn-outline';
      dlBtn.style.cssText = 'padding:10px 20px;';
      dlBtn.innerHTML = '<i class="ri-file-download-line" style="margin-right:6px;"></i> Invoice';
      dlBtn.addEventListener('click', async () => {
        const orig = dlBtn.innerHTML;
        dlBtn.disabled = true;
        dlBtn.innerHTML = '<span class="spinner-sm"></span>';
        try {
          if (typeof API.downloadInvoice === 'function') {
            await API.downloadInvoice(order.id);
          } else {
            // Graceful fallback: print/save page as PDF
            showToast('Invoice download coming soon', 'info');
          }
        } catch (err) {
          showToast('Invoice download failed: ' + err.message, 'error');
        } finally {
          dlBtn.disabled = false;
          dlBtn.innerHTML = orig;
        }
      });
      actions.appendChild(dlBtn);

      // Cancel button (only for pending)
      if (order.status === 'pending') {
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn btn-danger';
        cancelBtn.style.cssText = 'padding:10px 20px;';
        cancelBtn.innerHTML = '<i class="ri-close-circle-line" style="margin-right:6px;"></i> Cancel';
        cancelBtn.addEventListener('click', async () => {
          if (!confirm('Cancel this order? This cannot be undone.')) return;
          cancelBtn.disabled = true;
          cancelBtn.innerHTML = '<span class="spinner-sm"></span> Cancelling...';
          try {
            await API.cancelOrder(order.id);
            showToast('Order cancelled', 'info');
            loadOrders(currentPage);
          } catch (err) {
            showToast(err.message, 'error');
            cancelBtn.disabled = false;
            cancelBtn.innerHTML = '<i class="ri-close-circle-line" style="margin-right:6px;"></i> Cancel';
          }
        });
        actions.appendChild(cancelBtn);
      }

      bottom.appendChild(actions);

      // Summary (right)
      const summary = document.createElement('div');
      summary.className = 'order-summary';
      const rows = [
        ['Subtotal', formatPrice(order.subtotal)],
        ['Shipping', order.shipping_cost === 0
          ? '<span style="color:var(--success)"><i class="ri-truck-line"></i> Free</span>'
          : formatPrice(order.shipping_cost)],
        ['Tax', formatPrice(order.tax_amount)],
      ];
      rows.forEach(([label, val]) => {
        const row = document.createElement('div');
        row.className = 'summary-row';
        const l = document.createElement('span'); l.textContent = label;
        const v = document.createElement('span'); v.innerHTML  = val; // safe: formatPrice + our HTML
        row.appendChild(l); row.appendChild(v);
        summary.appendChild(row);
      });
      const totRow = document.createElement('div');
      totRow.className = 'summary-row total';
      totRow.innerHTML = `<span>Total</span><span>${formatPrice(order.total_amount)}</span>`;
      summary.appendChild(totRow);

      bottom.appendChild(summary);
      inner.appendChild(bottom);
      body.appendChild(inner);
    }

    /* ── Pagination ──────────────────────────────────────────────────────── */
    function renderPagination() {
      const wrap = document.getElementById('orders-pagination');
      wrap.innerHTML = '';

      if (totalPages <= 1) { wrap.style.display = 'none'; return; }
      wrap.style.display = 'flex';

      const mkBtn = (html, targetPage, isActive, isNav, isDisabled = false) => {
        const btn = document.createElement('button');
        btn.className = `page-btn ${isActive ? 'active' : ''} ${isNav ? 'nav-btn' : ''}`;
        btn.innerHTML = html;
        btn.disabled  = isDisabled || isActive;
        if (!btn.disabled) {
          btn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            loadOrders(targetPage);
          });
        }
        return btn;
      };

      // Prev
      wrap.appendChild(mkBtn('<i class="ri-arrow-left-s-line" style="font-size:18px;"></i>', currentPage - 1, false, true, currentPage === 1));

      // Pages with ellipsis for large counts
      const range = [];
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1) {
          range.push(i);
        } else if (range[range.length - 1] !== '…') {
          range.push('…');
        }
      }
      range.forEach(p => {
        if (p === '…') {
          const el = document.createElement('span');
          el.textContent = '…';
          el.style.cssText = 'padding:0 4px;color:var(--text-dim);font-size:13px;';
          wrap.appendChild(el);
        } else {
          wrap.appendChild(mkBtn(p, p, p === currentPage, false));
        }
      });

      // Next
      wrap.appendChild(mkBtn('<i class="ri-arrow-right-s-line" style="font-size:18px;"></i>', currentPage + 1, false, true, currentPage === totalPages));
    }
  </script>
</body>
