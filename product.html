<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — Luviio</title>
  
  <link rel="stylesheet" href="/css/luviio.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8360942174797973" crossorigin="anonymous"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    /* ── BASE & VARIABLES ── */
    :root {
      --font-display: 'Playfair Display', serif;
      --font-ui: 'Jost', sans-serif;
    }

    body {
      font-family: var(--font-ui);
      background-color: var(--bg, #050505);
      color: var(--text, #f4f0ea);
    }

    /* ── LAYOUT ── */
    .product-layout { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 60px; 
      padding: 10px 0 80px; 
      align-items: start;
    }

    /* ── BREADCRUMBS ── */
    .breadcrumb { 
      display: flex; 
      align-items: center;
      font-size: 12px; 
      margin-bottom: 24px; 
      color: var(--text-muted); 
      white-space: nowrap;
    }
    .breadcrumb a { color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb span.sep { margin: 0 8px; color: var(--border-light); }
    
    .bc-current {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      display: inline-block;
    }

    /* ── SWIPEABLE IMAGE CAROUSEL ── */
    .product-gallery-wrap { 
      display: flex; 
      flex-direction: column; 
      position: sticky;
      top: 100px;
    }

    .carousel-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -ms-overflow-style: none;
      aspect-ratio: 4/5; 
      background: var(--surface-2, #111); 
      border-radius: var(--radius, 8px);
      border: 1px solid var(--border, #222);
      position: relative;
    }
    .carousel-container::-webkit-scrollbar { display: none; }

    .carousel-slide {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      scroll-snap-align: center;
      position: relative;
    }
    
    .carousel-slide img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
    }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }
    .carousel-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border-light, #333);
      transition: background 0.3s, transform 0.3s;
    }
    .carousel-dot.active {
      background: var(--gold, #d4af37);
      transform: scale(1.3);
    }

    .product-img-placeholder { 
      position: absolute; inset: 0; display: flex; align-items: center; 
      justify-content: center; font-size: 80px; color: var(--border-light, #333); 
    }

    .product-badge-oos { 
      position: absolute; top: 16px; left: 16px; background: var(--error, #e04d36); 
      color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 1px; 
      text-transform: uppercase; padding: 6px 12px; border-radius: 4px; z-index: 10;
    }

    /* ── PRODUCT INFO & TYPOGRAPHY ── */
    .product-info { 
      display: flex; flex-direction: column; gap: 20px; 
    }
    
    .product-category { 
      font-size: 11px; font-weight: 600; letter-spacing: 2px; 
      text-transform: uppercase; color: var(--gold, #d4af37); 
    }
    
    .product-title { 
      font-family: var(--font-display); 
      font-size: clamp(24px, 6vw, 36px);
      font-weight: 600; line-height: 1.25; margin: 0; color: var(--text);
      letter-spacing: -0.01em;
    }
    
    .product-price-row { 
      display: flex; align-items: center; gap: 12px; 
    }
    
    .product-price { 
      font-size: 28px; font-weight: 500; color: var(--text); 
    }
    
    .product-compare { 
      font-size: 16px; color: var(--text-muted, #888); text-decoration: line-through; 
    }
    
    .divider { 
      border: none; border-top: 1px solid var(--border, #222); margin: 0; width: 100%; 
    }

    /* ── ADD TO CART SECTION ── */
    .add-to-cart-section { 
      display: flex; gap: 12px; align-items: center; flex-wrap: nowrap;
      width: 100%; margin-top: 8px;
    }
    
    .qty-control {
      display: flex; align-items: center; border: 1px solid var(--border);
      border-radius: 4px; background: var(--surface, #111);
      height: 48px; width: 110px; flex-shrink: 0;
    }
    
    .qty-btn {
      background: transparent; border: none; color: var(--text); width: 36px; 
      height: 100%; font-size: 18px; cursor: pointer; transition: background 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: rgba(255,255,255,0.05); }
    
    .qty-display {
      flex: 1; text-align: center; font-weight: 600; font-size: 14px;
      color: var(--text); border-left: 1px solid var(--border); border-right: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; height: 100%;
    }

    .btn-primary {
      flex: 1; height: 48px; font-weight: 600; font-size: 13px; letter-spacing: 1px;
      text-transform: uppercase; border-radius: 4px; border: none;
      background: var(--text); color: var(--bg); cursor: pointer;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      white-space: nowrap;
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--gold, #d4af37); color: #000;
    }
    .btn-primary:disabled {
      background: var(--surface-2); color: var(--text-muted); cursor: not-allowed;
    }

    .btn-pop { animation: btnPop 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes btnPop { 0% { transform: scale(1); } 50% { transform: scale(0.95); } 100% { transform: scale(1); } }

    /* ── COLLAPSIBLE DESCRIPTION ACCORDION ── */
    .product-accordion {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-top: 16px;
    }
    .accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
      user-select: none;
    }
    .accordion-icon {
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      color: var(--text-muted);
    }
    .accordion-header.active .accordion-icon {
      transform: rotate(180deg);
      color: var(--gold);
    }
    .accordion-content-wrap {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .accordion-header.active + .accordion-content-wrap {
      grid-template-rows: 1fr;
    }
    .accordion-content {
      overflow: hidden;
    }
    .accordion-inner {
      padding-bottom: 24px;
      font-size: 15px;
      color: #a09d98;
      line-height: 1.8;
      white-space: pre-line; /* Preserves line breaks from the full description */
    }

    /* ── META INFO ── */
    .product-meta { display: flex; flex-direction: column; gap: 12px; margin-top: 8px;}
    .product-meta-row { display: flex; gap: 16px; font-size: 13px; }
    .product-meta-label { color: var(--text-muted); min-width: 80px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; font-size: 10px; }
    .product-meta-value { color: var(--text); }

    /* ── STOCK BAR ── */
    .stock-bar-wrap { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .stock-bar-track { height: 4px; background: var(--surface-2, #222); border-radius: 2px; overflow: hidden; }
    .stock-bar-fill  { height: 100%; border-radius: 2px; width: 0%; }
    .stock-label { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
    .stock-label.ok  { color: #6dbb63; }
    .stock-label.low { color: var(--gold); }
    .stock-label.oos { color: var(--error); }

    @media (max-width: 900px) { 
      .product-layout { grid-template-columns: 1fr; gap: 32px; padding: 0 0 80px; } 
      .product-gallery-wrap { position: static; }
    }
    @media (min-width: 600px) {
      .bc-current { max-width: 300px; }
    }
  </style>
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="page-wrapper">
    <div class="container">
      
      <nav class="breadcrumb" id="product-breadcrumb" style="opacity: 0;">
        <a href="/index.html">Home</a><span class="sep">/</span>
        <a href="/shop.html">Shop</a><span class="sep">/</span>
        <span class="bc-current" id="bc-name">Loading...</span>
      </nav>

      <div id="product-layout" class="product-layout">
        <div style="aspect-ratio:4/5; border-radius:8px;" class="skeleton"></div>
        <div style="display:flex; flex-direction:column; gap:20px;">
          <div style="height:14px; width:100px;" class="skeleton"></div>
          <div style="height:40px;" class="skeleton"></div>
          <div style="height:32px; width:140px;" class="skeleton"></div>
          <div style="height:80px;" class="skeleton"></div>
          <div style="height:48px;" class="skeleton"></div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-bottom" style="border-top: 1px solid var(--border); margin-top:0; padding-top: 32px;">
          <span style="color: var(--text-muted); font-size: 13px;">© 2026 Luviio</span>
          <a href="/shop.html" style="color: var(--text); font-size: 13px; font-weight: 500; text-decoration: none;">← Return to Shop</a>
        </div>
      </div>
    </footer>
  </div>
  
  
  <script src="/js/keys.js"></script>

  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/push.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  
  <script>
    let product = null;
    let qty = 1;

    pageInit();

    // GSAP Page Entrance
    gsap.to("#product-breadcrumb", { opacity: 1, duration: 0.8, ease: "power2.out", delay: 0.1 });

    const slug = getParam('slug');
    if (!slug) { window.location.href = '/shop.html'; }
    else { loadProduct(slug); }

    async function loadProduct(slug) {
      try {
        product = await API.getProduct(slug);
        renderProduct(product);
      } catch (err) {
        document.getElementById('product-layout').innerHTML = `
          <div class="empty-state" style="grid-column:1/-1; padding: 80px 0; text-align: center;">
            <div style="font-size:40px; color:var(--error); margin-bottom:16px;">⚠</div>
            <h3 style="font-family: var(--font-display); font-size:24px; margin-bottom:12px;">Product not found</h3>
            <p style="color:var(--text-muted); margin-bottom:24px;">${escapeHTML(err.message)}</p>
            <a href="/shop.html" class="btn btn-primary" style="padding: 12px 32px; text-decoration:none; display:inline-block;">Return to Shop</a>
          </div>`;
      }
    }

    function renderProduct(p) {
      document.title = `${p.name} — Luviio`;
      document.getElementById('bc-name').textContent = p.name;

      // Meta & Canonical
      let canonicalUrl = window.location.origin + window.location.pathname + "?slug=" + slug;
      let linkTag = document.querySelector("link[rel='canonical']");
      if (!linkTag) {
        linkTag = document.createElement('link'); linkTag.setAttribute('rel', 'canonical');
        document.head.appendChild(linkTag);
      }
      linkTag.setAttribute('href', canonicalUrl);

      let metaDesc = document.querySelector("meta[name='description']");
      if (!metaDesc) {
        metaDesc = document.createElement('meta'); metaDesc.setAttribute('name', 'description');
        document.head.appendChild(metaDesc);
      }
      metaDesc.setAttribute('content', p.short_description || p.description || `Buy ${p.name} at Luviio.`);

      const layout   = document.getElementById('product-layout');
      const maxStock = p.stock ?? 0;
      const isOOS    = maxStock === 0;
      const isLow    = !isOOS && maxStock <= (p.low_stock_threshold || 10);
      qty = 1;

      layout.innerHTML = '';

      const images = p.images && p.images.length > 0 ? p.images : (p.image_url ? [p.image_url] : []);

      // ── Image Gallery (Swipeable Carousel) ───────────────────────────────────
      const imgSec = document.createElement('div');
      imgSec.className = 'gsap-img-sec';
      const galleryWrap = document.createElement('div');
      galleryWrap.className = 'product-gallery-wrap';

      const carouselContainer = document.createElement('div');
      carouselContainer.className = 'carousel-container';

      if (images.length > 0) {
        images.forEach((imgUrl, index) => {
          const slide = document.createElement('div');
          slide.className = 'carousel-slide';
          const img = document.createElement('img');
          img.src = escapeHTML(imgUrl);
          img.alt = `${escapeHTML(p.name)} - View ${index + 1}`;
          slide.appendChild(img);
          carouselContainer.appendChild(slide);
        });
      } else {
        const slide = document.createElement('div');
        slide.className = 'carousel-slide';
        const ph = document.createElement('div');
        ph.className = 'product-img-placeholder'; ph.textContent = '◈';
        slide.appendChild(ph);
        carouselContainer.appendChild(slide);
      }

      if (isOOS) {
        const badge = document.createElement('div');
        badge.className = 'product-badge-oos'; badge.textContent = 'Sold Out';
        carouselContainer.appendChild(badge);
      }
      
      galleryWrap.appendChild(carouselContainer);

      // Pagination Dots
      if (images.length > 1) {
        const dotsWrap = document.createElement('div');
        dotsWrap.className = 'carousel-dots';
        
        const dots = [];
        images.forEach((_, index) => {
          const dot = document.createElement('div');
          dot.className = 'carousel-dot' + (index === 0 ? ' active' : '');
          dotsWrap.appendChild(dot);
          dots.push(dot);
        });

        // Sync dots on scroll
        carouselContainer.addEventListener('scroll', () => {
          const slideWidth = carouselContainer.clientWidth;
          const scrollPosition = carouselContainer.scrollLeft;
          const activeIndex = Math.round(scrollPosition / slideWidth);
          
          dots.forEach((dot, idx) => {
            dot.classList.toggle('active', idx === activeIndex);
          });
        });

        galleryWrap.appendChild(dotsWrap);
      }
      
      imgSec.appendChild(galleryWrap);

      // ── Info Section ───────────────────────────────────────────────────────
      const info = document.createElement('div');
      info.className = 'product-info gsap-info-sec';

      if (p.categories?.name) {
        const cat = document.createElement('div');
        cat.className = 'product-category gsap-item'; cat.textContent = p.categories.name;
        info.appendChild(cat);
      }

      const title = document.createElement('h1');
      title.className = 'product-title gsap-item'; title.textContent = p.name;
      info.appendChild(title);

      // Price Row
      const priceRow = document.createElement('div');
      priceRow.className = 'product-price-row gsap-item';
      const priceEl = document.createElement('div');
      priceEl.className = 'product-price'; priceEl.textContent = formatPrice(p.price);
      priceRow.appendChild(priceEl);

      if (p.compare_price) {
        const cmp = document.createElement('div');
        cmp.className = 'product-compare'; cmp.textContent = formatPrice(p.compare_price);
        priceRow.appendChild(cmp);
      }
      info.appendChild(priceRow);

      // Stock Indicator
      const stockInfo = buildStockIndicator(maxStock, p.low_stock_threshold || 10);
      stockInfo.wrapper.className += ' gsap-item';
      info.appendChild(stockInfo.wrapper);

      // ── Add to cart UI ───────────────────────────
      const addSec = document.createElement('div');
      addSec.className = 'add-to-cart-section gsap-item';

      if (!isOOS) {
        const qtyCtrl = document.createElement('div');
        qtyCtrl.className = 'qty-control';

        const qtyMinus = document.createElement('button');
        qtyMinus.className = 'qty-btn'; qtyMinus.textContent = '−';

        const qtyDisp = document.createElement('div');
        qtyDisp.className = 'qty-display'; qtyDisp.textContent = qty;

        const qtyPlus = document.createElement('button');
        qtyPlus.className = 'qty-btn'; qtyPlus.textContent = '+';

        const updateQtyUI = () => {
          qtyDisp.textContent = qty;
          qtyMinus.style.opacity = qty <= 1        ? '0.4' : '1';
          qtyPlus.style.opacity  = qty >= maxStock ? '0.4' : '1';
        };

        qtyMinus.addEventListener('click', () => { if (qty > 1) { qty--; updateQtyUI(); } });
        qtyPlus.addEventListener('click', () => {
          if (qty >= maxStock) { showToast(`Only ${maxStock} in stock`, 'warn'); return; }
          qty++; updateQtyUI();
        });

        qtyCtrl.appendChild(qtyMinus); qtyCtrl.appendChild(qtyDisp); qtyCtrl.appendChild(qtyPlus);
        addSec.appendChild(qtyCtrl);
        updateQtyUI();
      }

      const addBtn = document.createElement('button');
      addBtn.className = 'btn btn-primary'; 
      addBtn.textContent = isOOS ? 'Sold Out' : 'ADD TO CART';
      addBtn.disabled = isOOS;

      addBtn.addEventListener('click', () => {
        addBtn.classList.remove('btn-pop');
        void addBtn.offsetWidth;
        addBtn.classList.add('btn-pop');

        const added = CART.add(p, qty);
        if (added !== false) {
          showToast(`${p.name} × ${qty} added`, 'success');
          
          const ogText = addBtn.textContent;
          gsap.to(addBtn, { opacity: 0, duration: 0.15, onComplete: () => {
            addBtn.textContent = '✓ ADDED TO CART';
            addBtn.style.background = 'var(--gold)'; addBtn.style.color = '#000';
            gsap.to(addBtn, { opacity: 1, duration: 0.15 });
          }});

          setTimeout(() => { 
            gsap.to(addBtn, { opacity: 0, duration: 0.15, onComplete: () => {
              addBtn.textContent = ogText;
              addBtn.style.background = ''; addBtn.style.color = '';
              gsap.to(addBtn, { opacity: 1, duration: 0.15 });
            }});
          }, 1500);
        }
      });

      addSec.appendChild(addBtn);
      info.appendChild(addSec);

      // ── Collapsible Full Description (Accordion) ──
      if (p.description || p.short_description) {
        const accordion = document.createElement('div');
        accordion.className = 'product-accordion gsap-item';

        const header = document.createElement('div');
        header.className = 'accordion-header';
        
        // Use SVG for a clean arrow
        header.innerHTML = `
          <span>Product Details</span>
          <span class="accordion-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </span>
        `;

        const contentWrap = document.createElement('div');
        contentWrap.className = 'accordion-content-wrap';
        
        const content = document.createElement('div');
        content.className = 'accordion-content';
        
        const inner = document.createElement('div');
        inner.className = 'accordion-inner';
        // Display full description, fallback to short if full is missing
        inner.textContent = p.description || p.short_description;

        content.appendChild(inner);
        contentWrap.appendChild(content);
        
        accordion.appendChild(header);
        accordion.appendChild(contentWrap);

        // Toggle click event
        header.addEventListener('click', () => {
          header.classList.toggle('active');
        });

        info.appendChild(accordion);
      }

      // Meta Data (SKU, Weight)
      if (p.sku || p.weight_grams) {
        const meta = document.createElement('div'); meta.className = 'product-meta gsap-item';
        const addMeta = (label, val) => {
          const row = document.createElement('div'); row.className = 'product-meta-row';
          const l = document.createElement('span'); l.className = 'product-meta-label'; l.textContent = label;
          const v = document.createElement('span'); v.className = 'product-meta-value'; v.textContent = val;
          row.appendChild(l); row.appendChild(v); meta.appendChild(row);
        };
        if (p.sku)            addMeta('SKU', p.sku);
        if (p.weight_grams)   addMeta('Weight', `${p.weight_grams}g`);
        info.appendChild(meta);
      }

      layout.appendChild(imgSec);
      layout.appendChild(info);

      // ── GSAP Staggered Entrance Animations ──
      gsap.fromTo(".gsap-img-sec", 
        { opacity: 0, x: -20 }, 
        { opacity: 1, x: 0, duration: 0.7, ease: "power3.out" }
      );

      gsap.fromTo(".gsap-item", 
        { opacity: 0, y: 15 }, 
        { opacity: 1, y: 0, duration: 0.5, stagger: 0.06, ease: "power2.out", delay: 0.1 }
      );

      if(stockInfo.fillElement && stockInfo.targetWidth) {
        gsap.fromTo(stockInfo.fillElement, 
          { width: "0%" }, 
          { width: stockInfo.targetWidth, duration: 1.2, ease: "power3.out", delay: 0.5 }
        );
      }
    }

    // ── Stock indicator Logic ────────────────────────
    function buildStockIndicator(stock, threshold) {
      const wrap = document.createElement('div');
      wrap.className = 'stock-bar-wrap';

      const label = document.createElement('div');
      label.className = 'stock-label';

      const track = document.createElement('div');
      track.className = 'stock-bar-track';
      const fill = document.createElement('div');
      fill.className = 'stock-bar-fill';

      let targetWidth = "0%";

      if (stock === 0) {
        label.className += ' oos';
        label.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-bottom:-2px"><path d="M6 18L18 6M6 6l12 12"/></svg> Out of stock';
        targetWidth = '0%';
        fill.style.background = 'var(--error)';
      } else if (stock <= 3) {
        label.className += ' low';
        label.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-bottom:-2px"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg> Only ${stock} left — order soon!`;
        targetWidth = `${Math.min(stock / threshold * 100, 100)}%`;
        fill.style.background = 'var(--error)';
      } else if (stock <= threshold) {
        label.className += ' low';
        label.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-bottom:-2px"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg> Low stock — ${stock} remaining`;
        targetWidth = `${Math.min(stock / threshold * 100, 100)}%`;
        fill.style.background = 'var(--gold)';
      } else {
        label.className += ' ok';
        label.innerHTML = '<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-bottom:-2px"><path d="M5 13l4 4L19 7"/></svg> In stock & ready to ship';
        targetWidth = '100%';
        fill.style.background = '#6dbb63';
      }

      track.appendChild(fill);
      wrap.appendChild(label);
      if (stock > 0) wrap.appendChild(track);

      return { wrapper: wrap, fillElement: fill, targetWidth: targetWidth };
    }
  </script>
</body>
</html>
