<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — Luviio</title>
  <link rel="stylesheet" href="/css/luviio.css">
  <style>
    .cart-layout { display: grid; grid-template-columns: 1fr 360px; gap: 40px; padding: 40px 0 80px; }
    .cart-item {
      display: flex; gap: 20px; padding: 24px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .cart-item.stock-warn { background: rgba(224,169,82,.04); border-radius: var(--radius); padding: 16px; }
    .cart-item-img {
      width: 90px; height: 110px; flex-shrink: 0;
      background: var(--surface-2); border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; color: var(--border-light);
    }
    .cart-item-img img { width:100%;height:100%;object-fit:cover; }
    .cart-item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }
    .cart-item-name { font-size: 15px; font-weight: 500; color: var(--text); text-decoration: none; }
    .cart-item-name:hover { color: var(--gold); }
    .cart-item-price { font-size: 14px; color: var(--text-muted); }
    .cart-item-controls { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .cart-item-subtotal { font-size: 16px; font-weight: 700; color: var(--gold); }
    .remove-btn {
      background: none; border: none; color: var(--text-dim); font-size: 12px;
      cursor: pointer; padding: 4px; transition: color 0.2s;
    }
    .remove-btn:hover { color: var(--error); }

    /* Stock warning pill */
    .stock-pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 700; padding: 3px 9px;
      border-radius: 20px; margin-top: 4px;
    }
    .stock-pill.low   { background: rgba(224,169,82,.15); color: var(--warn); }
    .stock-pill.out   { background: rgba(224,82,82,.15);  color: var(--error); }

    /* Stock warning banner */
    .stock-banner {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 12px 16px; border-radius: var(--radius);
      background: rgba(224,169,82,.08); border: 1px solid rgba(224,169,82,.25);
      font-size: 13px; color: var(--warn); margin-bottom: 20px;
    }
    .stock-banner.error { background: rgba(224,82,82,.08); border-color: rgba(224,82,82,.25); color: var(--error); }

    .summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 28px;
      position: sticky; top: calc(var(--nav-h) + 20px);
    }
    .summary-title { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; margin-bottom:24px; }

    @media(max-width:900px){.cart-layout{grid-template-columns:1fr;} .summary-card{position:static;}}
    @media(max-width:600px){.cart-item-img{width:72px;height:88px;}}
  </style>
</head>
<body>
  <nav id="main-nav"></nav>

  <div class="page-wrapper">
    <div class="container">
      <nav class="breadcrumb">
        <a href="/index.html">Home</a><span>›</span><span>Cart</span>
      </nav>

      <h1 class="section-title" style="margin-bottom:8px;">Your Cart</h1>
      <p id="cart-subtitle" style="color:var(--text-muted);font-size:14px;margin-bottom:24px;"></p>

      <!-- Stock warnings banner -->
      <div id="stock-warnings"></div>

      <div class="cart-layout">
        <div id="cart-items"></div>

        <!-- Order Summary -->
        <div class="summary-card">
          <div class="summary-title">Order Summary</div>
          <div id="summary-rows"></div>
          <hr class="divider">
          <a id="checkout-btn" href="/checkout.html" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px;">
            Proceed to Checkout
          </a>
          <a href="/shop.html" class="btn btn-outline" style="width:100%;justify-content:center;margin-top:12px;">
            Continue Shopping
          </a>
          <p style="font-size:11px;color:var(--text-dim);text-align:center;margin-top:16px;line-height:1.6;">
            🔒 Secure checkout via Stripe.<br>Taxes & shipping calculated at checkout.
          </p>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      <div class="container">
        <div class="footer-bottom" style="border-top:none;margin-top:0;">
          <span>© 2026 Luviio</span>
          <a href="/shop.html">← Continue Shopping</a>
        </div>
      </div>
    </footer>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    pageInit();
    renderCart();
    // Check live stock on page load
    checkLiveStock();

    window.addEventListener('cart:updated', renderCart);

    // ── Live stock check ─────────────────────────────────────────────────────
    async function checkLiveStock() {
      const warnings = await CART.checkStock();
      const bannerEl = document.getElementById('stock-warnings');
      bannerEl.innerHTML = '';

      if (!warnings.length) return;

      warnings.forEach(w => {
        const div = document.createElement('div');
        div.className = 'stock-banner' + (w.reason === 'out_of_stock' ? ' error' : '');
        if (w.reason === 'out_of_stock') {
          div.innerHTML = `<span>⚠</span><span><strong>${escapeHTML(w.name)}</strong> is now out of stock and has been removed from your cart.</span>`;
          CART.remove(w.id);
        } else {
          div.innerHTML = `<span>⚠</span><span>Only <strong>${w.liveStock}</strong> units of <strong>${escapeHTML(w.name)}</strong> available. Your quantity has been adjusted.</span>`;
          CART.update(w.id, w.liveStock);
        }
        bannerEl.appendChild(div);
      });

      // Re-render after adjustments
      if (warnings.length) renderCart();
    }

    // ── Render cart ──────────────────────────────────────────────────────────
    function renderCart() {
      const items = CART.get();
      const wrap  = document.getElementById('cart-items');
      const sub   = document.getElementById('cart-subtitle');
      const sum   = document.getElementById('summary-rows');
      const btn   = document.getElementById('checkout-btn');
      const total = CART.count();

      sub.textContent = `${total} item${total !== 1 ? 's' : ''}`;

      if (!items.length) {
        wrap.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🛍</div>
            <h3>Your cart is empty</h3>
            <p>Add some beautiful items to get started.</p>
            <a href="/shop.html" class="btn btn-primary">Shop Now</a>
          </div>
        `;
        sum.innerHTML = '<p style="color:var(--text-dim);font-size:13px;text-align:center;">No items yet</p>';
        btn.style.opacity = '0.5';
        btn.style.pointerEvents = 'none';
        return;
      }

      btn.style.opacity = '';
      btn.style.pointerEvents = '';

      wrap.innerHTML = '';
      items.forEach(item => wrap.appendChild(makeItemRow(item)));

      // Summary totals
      const subtotal = CART.total();
      const shipping = subtotal >= 75 ? 0 : 9.99;
      const tax      = (subtotal + shipping) * 0.08;
      const grandTotal = subtotal + shipping + tax;

      sum.innerHTML = '';
      [
        ['Subtotal', formatPrice(subtotal)],
        ['Shipping', shipping === 0 ? 'Free 🎉' : formatPrice(shipping)],
        ['Tax (8%)', formatPrice(tax)],
      ].forEach(([label, val]) => {
        const row = document.createElement('div');
        row.className = 'order-row';
        const l = document.createElement('span'); l.textContent = label;
        const v = document.createElement('span'); v.textContent = val;
        if (val === 'Free 🎉') v.style.color = 'var(--success)';
        row.appendChild(l); row.appendChild(v);
        sum.appendChild(row);
      });

      const totalRow = document.createElement('div');
      totalRow.className = 'order-row total';
      totalRow.style.cssText = 'border-top:2px solid var(--border);margin-top:8px;padding-top:16px;';
      const tl = document.createElement('span'); tl.textContent = 'Total';
      const tv = document.createElement('span'); tv.textContent = formatPrice(grandTotal);
      totalRow.appendChild(tl); totalRow.appendChild(tv);
      sum.appendChild(totalRow);

      if (shipping > 0) {
        const note = document.createElement('p');
        note.style.cssText = 'font-size:12px;color:var(--text-muted);text-align:center;margin-top:12px;';
        note.textContent = `Add ${formatPrice(75 - subtotal)} more for free shipping`;
        sum.appendChild(note);
      }
    }

    // ── Build item row ───────────────────────────────────────────────────────
    function makeItemRow(item) {
      const maxStock   = item.maxStock ?? 99;
      const isLow      = maxStock > 0 && maxStock <= 5;
      const isOut      = maxStock === 0;

      const row = document.createElement('div');
      row.className = 'cart-item' + (isLow || isOut ? ' stock-warn' : '');

      // Image
      const imgWrap = document.createElement('div');
      imgWrap.className = 'cart-item-img';
      if (item.image) {
        const img = document.createElement('img');
        img.src = escapeHTML(item.image);
        img.alt = escapeHTML(item.name);
        imgWrap.appendChild(img);
      } else {
        imgWrap.textContent = '◈';
      }

      // Info
      const info = document.createElement('div');
      info.className = 'cart-item-info';

      const nameEl = document.createElement('a');
      nameEl.className = 'cart-item-name';
      nameEl.href = `/product.html?slug=${encodeURIComponent(item.slug || '')}`;
      nameEl.textContent = item.name;

      const unitP = document.createElement('div');
      unitP.className = 'cart-item-price';
      unitP.textContent = formatPrice(item.price) + ' each';

      // Stock pill
      if (isOut) {
        const pill = document.createElement('span');
        pill.className = 'stock-pill out';
        pill.textContent = '✕ Out of stock';
        info.appendChild(nameEl);
        info.appendChild(unitP);
        info.appendChild(pill);
      } else if (isLow) {
        const pill = document.createElement('span');
        pill.className = 'stock-pill low';
        pill.textContent = `⚠ Only ${maxStock} left`;
        info.appendChild(nameEl);
        info.appendChild(unitP);
        info.appendChild(pill);
      } else {
        info.appendChild(nameEl);
        info.appendChild(unitP);
      }

      // Controls
      const controls = document.createElement('div');
      controls.className = 'cart-item-controls';

      // Qty
      const qtyCtrl = document.createElement('div');
      qtyCtrl.className = 'qty-control';

      const minus = document.createElement('button');
      minus.className = 'qty-btn';
      minus.textContent = '−';
      minus.addEventListener('click', () => CART.update(item.id, item.qty - 1));

      const disp = document.createElement('div');
      disp.className = 'qty-display';
      disp.textContent = item.qty;

      const plus = document.createElement('button');
      plus.className = 'qty-btn';
      plus.textContent = '+';
      plus.disabled = item.qty >= maxStock;
      plus.style.opacity = item.qty >= maxStock ? '0.4' : '1';
      plus.title = item.qty >= maxStock ? `Max ${maxStock} available` : '';
      plus.addEventListener('click', () => {
        if (item.qty >= maxStock) {
          showToast(`Only ${maxStock} in stock`, 'warn');
          return;
        }
        CART.update(item.id, item.qty + 1);
      });

      qtyCtrl.appendChild(minus);
      qtyCtrl.appendChild(disp);
      qtyCtrl.appendChild(plus);

      // Right side
      const right = document.createElement('div');
      right.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:6px;';

      const subtotalEl = document.createElement('div');
      subtotalEl.className = 'cart-item-subtotal';
      subtotalEl.textContent = formatPrice(item.price * item.qty);

      const removeBtn = document.createElement('button');
      removeBtn.className = 'remove-btn';
      removeBtn.textContent = '✕ Remove';
      removeBtn.addEventListener('click', () => {
        CART.remove(item.id);
        showToast('Item removed', 'info');
      });

      right.appendChild(subtotalEl);
      right.appendChild(removeBtn);

      controls.appendChild(qtyCtrl);
      controls.appendChild(right);

      info.appendChild(controls);
      row.appendChild(imgWrap);
      row.appendChild(info);
      return row;
    }
  </script>
</body>
</html>
